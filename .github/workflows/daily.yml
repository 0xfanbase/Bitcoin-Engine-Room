name: Daily Snapshot

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

concurrency:
  group: daily-snapshot
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run daily snapshot
        id: snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m pipeline.fetch_snapshot

      - name: Refit models
        run: python -m pipeline.fit_models

      - name: Run audit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m pipeline.audit

      - name: Commit and push if changed
        # Runs even if fit_models/audit failed after a successful snapshot,
        # so a downstream crash never discards a real day's fetched data
        # (previously the whole job's changes were lost, silently creating a
        # permanent continuity gap with no way to backfill the missed day).
        if: always() && steps.snapshot.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ IMPROVEMENT_BACKLOG.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(data): snapshot $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi
